<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חידון האהבה שלנו</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0b1026;
    --navy-mid:#141b3a;
    --gold:#d4af37;
    --gold-soft:#e8cf82;
    --blush:#f0b8c2;
    --cream:#f6f1e6;
    --lavender:#8d87c9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; background:var(--navy-deep); color:var(--cream); font-family:"Heebo", sans-serif; overflow-x:hidden; }
  body{ display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; position:relative; }
  #stars{ position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse at 20% 10%, rgba(141,135,201,.15), transparent 55%), radial-gradient(ellipse at 80% 85%, rgba(212,175,55,.10), transparent 55%), var(--navy-deep); }
  .star{ position:absolute; background:var(--cream); border-radius:50%; opacity:.6; animation:twinkle 4s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:.15; transform:scale(.8);} 50%{opacity:.9; transform:scale(1.15);} }
  .shell{ position:relative; z-index:2; width:100%; max-width:560px; }
  .eyebrow{ text-align:center; font-size:13px; letter-spacing:.18em; color:var(--gold-soft); text-transform:uppercase; margin-bottom:10px; font-weight:500; }
  .titles{ text-align:center; margin-bottom:28px; }
  .titles h1{ font-family:"Frank Ruhl Libre", serif; font-weight:700; font-size:clamp(28px, 6vw, 40px); color:var(--cream); line-height:1.25; }
  .trail-wrap{ display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:26px; flex-wrap:wrap; }
  .trail-dot{ width:11px; height:11px; border-radius:50%; background:rgba(246,241,230,.18); border:1px solid rgba(212,175,55,.35); transition:all .5s ease; }
  .trail-dot.done{ background:var(--gold); box-shadow:0 0 10px 2px rgba(212,175,55,.6); }
  .trail-dot.current{ background:var(--blush); box-shadow:0 0 12px 3px rgba(240,184,194,.55); transform:scale(1.25); }
  .trail-line{ width:18px; height:1px; background:rgba(212,175,55,.25); }
  .trail-line.done{ background:var(--gold); }
  .card{ background:linear-gradient(180deg, rgba(20,27,58,.9), rgba(11,16,38,.9)); border:1px solid rgba(212,175,55,.25); border-radius:18px; padding:34px 30px; backdrop-filter:blur(6px); box-shadow:0 20px 60px rgba(0,0,0,.45); animation:fadeUp .6s ease; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .q-header{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
  .q-label{ font-size:12px; letter-spacing:.14em; color:var(--lavender); text-transform:uppercase; }
  .score-pill{ font-size:12px; background:rgba(212,175,55,.12); border:1px solid rgba(212,175,55,.3); color:var(--gold-soft); padding:4px 12px; border-radius:20px; white-space:nowrap; }
  .gallery{ display:flex; gap:10px; margin-bottom:20px; }
  .gallery img{ flex:1 1 0; width:100%; height:150px; object-fit:cover; border-radius:10px; border:1px solid rgba(212,175,55,.3); cursor:zoom-in; transition:transform .2s ease, filter .2s ease; }
  .gallery img:hover{ transform:scale(1.03); filter:brightness(1.08); }
  .q-text{ font-family:"Frank Ruhl Libre", serif; font-size:clamp(20px,4.4vw,25px); line-height:1.5; margin-bottom:24px; color:var(--cream); }
  .options{ display:flex; flex-direction:column; gap:12px; }
  .opt-btn{ text-align:right; background:rgba(246,241,230,.04); border:1px solid rgba(246,241,230,.18); color:var(--cream); font-family:"Heebo", sans-serif; font-size:16px; font-weight:400; padding:14px 18px; border-radius:11px; cursor:pointer; transition:all .25s ease; }
  .opt-btn:hover{ border-color:var(--gold); background:rgba(212,175,55,.08); transform:translateX(-3px); }
  .opt-btn.correct{ background:rgba(212,175,55,.18); border-color:var(--gold); color:var(--gold-soft); }
  .opt-btn.wrong{ background:rgba(240,120,120,.12); border-color:rgba(240,120,120,.5); }
  .opt-btn:disabled{ cursor:default; }
  .feedback{ margin-top:16px; font-size:14px; color:var(--gold-soft); min-height:20px; text-align:center; }
  .next-btn{ display:none; margin:22px auto 0; background:var(--gold); color:var(--navy-deep); border:none; padding:12px 34px; border-radius:30px; font-family:"Heebo", sans-serif; font-weight:600; font-size:15px; cursor:pointer; transition:transform .2s ease, box-shadow .2s ease; }
  .next-btn:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(212,175,55,.35); }
  .next-btn.show{ display:block; }
  .center-panel{ text-align:center; }
  .center-panel p{ font-size:16px; line-height:1.7; color:rgba(246,241,230,.8); margin-bottom:26px; }
  .start-btn, .go-btn{ background:var(--gold); color:var(--navy-deep); border:none; padding:15px 42px; border-radius:32px; font-family:"Heebo", sans-serif; font-weight:600; font-size:16px; cursor:pointer; transition:transform .2s ease, box-shadow .2s ease; }
  .start-btn:hover, .go-btn:hover{ transform:translateY(-2px); box-shadow:0 10px 26px rgba(212,175,55,.4); }
  .final-heart{ font-size:52px; margin-bottom:18px; animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.12); } }
  .final-title{ font-family:"Frank Ruhl Libre", serif; font-size:clamp(30px,7vw,44px); font-weight:900; color:var(--gold-soft); margin-bottom:14px; line-height:1.3; }
  .yn-wrap{ display:flex; gap:16px; justify-content:center; margin-top:30px; position:relative; min-height:60px; flex-wrap:wrap; }
  .yes-btn{ background:var(--gold); color:var(--navy-deep); border:none; padding:16px 40px; border-radius:32px; font-weight:700; font-size:18px; cursor:pointer; transition:transform .2s ease, box-shadow .2s ease; }
  .yes-btn:hover{ transform:scale(1.06); box-shadow:0 10px 26px rgba(212,175,55,.45); }
  .no-btn{ background:transparent; color:rgba(246,241,230,.6); border:1px solid rgba(246,241,230,.3); padding:16px 40px; border-radius:32px; font-weight:400; font-size:16px; cursor:pointer; position:relative; transition:transform .15s ease; }
  .yes-screen{ display:none; }
  .yes-screen.show{ display:block; }
  .confetti-piece{ position:fixed; top:-20px; z-index:5; border-radius:2px; pointer-events:none; }
  #lightbox{ position:fixed; inset:0; background:rgba(11,16,38,.92); display:none; align-items:center; justify-content:center; z-index:60; padding:24px; cursor:zoom-out; }
  #lightbox.show{ display:flex; }
  #lightbox img{ max-width:100%; max-height:90vh; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.6); }
  .music-btn{ position:fixed; bottom:22px; left:22px; width:50px; height:50px; border-radius:50%; background:rgba(20,27,58,.85); border:1px solid rgba(212,175,55,.4); color:var(--gold-soft); font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:40; box-shadow:0 8px 24px rgba(0,0,0,.4); transition:transform .2s ease; }
  .music-btn:hover{ transform:scale(1.08); }
  .music-btn.playing{ animation:spin 3s linear infinite; }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @media (max-width:420px){
    .card{ padding:26px 20px; }
    .yn-wrap{ flex-direction:column; align-items:center; }
    .gallery{ flex-wrap:wrap; }
    .gallery img{ height:110px; flex:1 1 45%; }
  }
</style>
</head>
<body>

<div id="stars"></div>
<div id="lightbox"><img id="lightbox-img" src="" alt=""></div>

<div class="shell">

  <div id="screen-intro">
    <div class="eyebrow"></div>
    <div class="titles"><h1>שלום. עשיתי חידון :) 💫</h1></div>
    <div class="card center-panel">
      <p>יש לך הזדמנות עכשיו ללכת לקחת אטנט</p>
      <button class="start-btn" onclick="startQuiz()">בואי נתחיל</button>
    </div>
  </div>

  <div id="screen-quiz" style="display:none;">
    <div class="trail-wrap" id="trail"></div>
    <div class="card">
      <div class="q-header">
        <div class="q-label" id="q-label">שאלה</div>
        <div class="score-pill" id="score-pill">0 / 0</div>
      </div>
      <div class="gallery" id="q-gallery"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
      <div class="feedback" id="q-feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">השאלה הבאה</button>
    </div>
  </div>

  <div id="screen-recap" style="display:none;">
    <div class="card center-panel">
      <div class="final-heart">🌟</div>
      <div class="final-title" style="font-size:clamp(24px,5.5vw,30px)">כל הכבוד!</div>
      <p id="recap-text"></p>
      <button class="go-btn" onclick="showFinal()">להמשך</button>
    </div>
  </div>

  <div id="screen-final" style="display:none;">
    <div class="card center-panel">
      <div id="final-question">
        <div class="final-heart">💍</div>
        <div class="final-title">לא רע לא רע, עכשיו בארון מעל המכונת כביסה מצד ימין יש קופסא, תוציאי אותה. תפתחי</div>
        <p></p>
        <div class="final-title" style="font-size:clamp(24px,5.5vw,32px)">אהבת אותה?</div>
        <div class="yn-wrap">
          <button class="yes-btn" onclick="sayYes()">כן! 💖</button>
          <button class="no-btn" id="no-btn">לא</button>
        </div>
      </div>
      <div class="yes-screen" id="yes-screen">
        <div class="final-heart">🎉</div>
        <div class="final-title">אווו אהבה שלי ידעתי שתאהבי!</div>
        <p></p>
      </div>
    </div>
  </div>

</div>

<audio id="bg-audio" src="https://example.com/our-song.mp3" loop></audio>
<button class="music-btn" id="music-btn" title="השיר שלנו">🎵</button>

<script>
const QUESTIONS = [{"images":["photos\\pic_1.JPEG","photos/pic_2.JPEG"],"question":"מה היה תאריך הנשיקה הראשונה?","options":["28/11/24","30/11/24","01/12/24"],"correct":2,"dodge":false,"dodgeIndex":-1},{"images":["photos\\pic_3.JPEG","photos\\pic_4.JPEG","photos\\pic_5.JPEG"],"question":"מה המסע הכי קשה שהעברתי אותך?","options":["שיט 13 שעות","טיול לראש ההר","צחצוח שיניים כל לילה"],"correct":2,"dodge":false,"dodgeIndex":-1},{"images":["photos\\pic_6.JPEG","photos\\pic_7.JPEG","photos\\pic_8.JPEG"],"question":"הטירמיסו הכי טעים שאכלנו:","options":["באיטליה, בעיר שממנה יצאנו לשיט","בירושלים","שלך❤ "],"correct":0,"dodge":false,"dodgeIndex":-1},{"images":["photos\\pic_9.JPEG","photos\\pic_10.JPEG","photos\\pic_11.JPEG"],"question":"כמה מירו השתתף איתי בעלויות הטבעת?","options":["25%","50%"," לא אכל אותה שכשנתתי לו לראות "],"correct":2,"dodge":false,"dodgeIndex":-1},{"images":["photos\\pic_12.JPEG","photos\\pic_13.JPEG"],"question":"מי קם מהשעונים המעוררים שלך?","options":["אני","מירו","את","תשובות 1 ו2 נכונות"],"correct":3,"dodge":false,"dodgeIndex":-1}];
const SHUFFLE_OPTIONS = false;

let current = 0;
let score = 0;
let activeQuestion = null;

function buildTrail(){
  const trail = document.getElementById("trail");
  trail.innerHTML = "";
  QUESTIONS.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "trail-dot";
    dot.id = "dot-" + i;
    trail.appendChild(dot);
    if(i < QUESTIONS.length - 1){
      const line = document.createElement("div");
      line.className = "trail-line";
      line.id = "line-" + i;
      trail.appendChild(line);
    }
  });
}

function updateTrail(){
  QUESTIONS.forEach((_, i) => {
    const dot = document.getElementById("dot-" + i);
    dot.classList.remove("done","current");
    if(i < current) dot.classList.add("done");
    else if(i === current) dot.classList.add("current");
    if(i < QUESTIONS.length - 1){
      const line = document.getElementById("line-" + i);
      line.classList.toggle("done", i < current);
    }
  });
}

function startQuiz(){
  document.getElementById("screen-intro").style.display = "none";
  document.getElementById("screen-quiz").style.display = "block";
  buildTrail();
  renderQuestion();
}

function resolveQuestion(q){
  let images = q.images || [];
  let options = q.options.slice();
  let correct = q.correct;
  let dodgeIndex = (typeof q.dodgeIndex === "number") ? q.dodgeIndex : -1;
  if(q.dodge && dodgeIndex < 0){
    const wrongIdxs = options.map((_, i) => i).filter(i => i !== correct);
    dodgeIndex = wrongIdxs[Math.floor(Math.random() * wrongIdxs.length)];
  }
  if(SHUFFLE_OPTIONS){
    const order = options.map((_, i) => i);
    for(let i = order.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const tmp = order[i]; order[i] = order[j]; order[j] = tmp;
    }
    const newOptions = order.map(i => options[i]);
    const newCorrect = order.indexOf(correct);
    const newDodge = dodgeIndex >= 0 ? order.indexOf(dodgeIndex) : -1;
    options = newOptions; correct = newCorrect; dodgeIndex = newDodge;
  }
  if(dodgeIndex === correct) dodgeIndex = -1;
  return { images: images, text: q.question, options: options, correct: correct, dodge: (q.dodge && dodgeIndex >= 0), dodgeIndex: dodgeIndex };
}

function renderQuestion(){
  updateTrail();
  const raw = QUESTIONS[current];
  activeQuestion = resolveQuestion(raw);

  document.getElementById("q-label").textContent = "שאלה " + (current + 1) + " מתוך " + QUESTIONS.length;
  document.getElementById("score-pill").textContent = score + " / " + QUESTIONS.length;
  document.getElementById("q-text").textContent = activeQuestion.text;
  document.getElementById("q-feedback").textContent = "";
  document.getElementById("next-btn").classList.remove("show");

  const gallery = document.getElementById("q-gallery");
  gallery.innerHTML = "";
  activeQuestion.images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.alt = "";
    img.onclick = () => openLightbox(src);
    gallery.appendChild(img);
  });
  gallery.style.display = activeQuestion.images.length ? "flex" : "none";

  const optWrap = document.getElementById("q-options");
  optWrap.innerHTML = "";
  activeQuestion.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, btn);
    if(activeQuestion.dodge && i === activeQuestion.dodgeIndex){
      attachDodge(btn, optWrap);
    }
    optWrap.appendChild(btn);
  });
}

function attachDodge(btn, container){
  const dodge = (e) => {
    if(e) e.preventDefault();
    const rect = container.getBoundingClientRect();
    const maxX = Math.max(rect.width - btn.offsetWidth, 60);
    const x = (Math.random() - 0.5) * maxX;
    const y = (Math.random() - 0.5) * 50;
    btn.style.position = "relative";
    btn.style.transform = "translate(" + x + "px, " + y + "px)";
  };
  btn.addEventListener("mouseenter", dodge);
  btn.addEventListener("touchstart", dodge, { passive: false });
}

function selectAnswer(i, btn){
  const buttons = document.querySelectorAll("#q-options .opt-btn");
  buttons.forEach(b => b.disabled = true);

  if(i === activeQuestion.correct){
    btn.classList.add("correct");
    document.getElementById("q-feedback").textContent = "נכון! 💛";
    score++;
    document.getElementById("score-pill").textContent = score + " / " + QUESTIONS.length;
  } else {
    btn.classList.add("wrong");
    buttons[activeQuestion.correct].classList.add("correct");
    document.getElementById("q-feedback").textContent = "לא נכון בכלל";
  }
  document.getElementById("next-btn").classList.add("show");
}

function nextQuestion(){
  current++;
  if(current >= QUESTIONS.length){
    showRecap();
  } else {
    renderQuestion();
  }
}

function showRecap(){
  document.getElementById("screen-quiz").style.display = "none";
  document.getElementById("screen-recap").style.display = "block";
  document.getElementById("recap-text").textContent = "ענית נכון על " + score + " מתוך " + QUESTIONS.length + " שאלות!";
}

function showFinal(){
  document.getElementById("screen-recap").style.display = "none";
  document.getElementById("screen-final").style.display = "block";
}

function openLightbox(src){
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("show");
}
document.getElementById("lightbox").addEventListener("click", () => {
  document.getElementById("lightbox").classList.remove("show");
});

const noBtn = document.getElementById("no-btn");
function moveNoButton(){
  const wrap = noBtn.closest(".yn-wrap");
  const wrapRect = wrap.getBoundingClientRect();
  const maxX = Math.max(wrapRect.width - noBtn.offsetWidth, 40);
  const maxY = 120;
  const x = (Math.random() - 0.5) * maxX;
  const y = (Math.random() - 0.5) * maxY;
  noBtn.style.transform = "translate(" + x + "px, " + y + "px)";
}
noBtn.addEventListener("mouseenter", moveNoButton);
noBtn.addEventListener("click", (e) => { e.preventDefault(); moveNoButton(); });
noBtn.addEventListener("touchstart", (e) => { e.preventDefault(); moveNoButton(); });

function sayYes(){
  document.getElementById("final-question").style.display = "none";
  document.getElementById("yes-screen").classList.add("show");
  launchConfetti();
}

function launchConfetti(){
  const colors = ["#d4af37", "#f0b8c2", "#f6f1e6", "#8d87c9"];
  for(let i = 0; i < 80; i++){
    setTimeout(() => {
      const piece = document.createElement("div");
      piece.className = "confetti-piece";
      const size = 6 + Math.random() * 6;
      piece.style.width = size + "px";
      piece.style.height = (size * 0.4) + "px";
      piece.style.left = (Math.random() * 100) + "vw";
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animation = "fall " + (2.5 + Math.random() * 2) + "s linear forwards";
      piece.style.transform = "rotate(" + (Math.random() * 360) + "deg)";
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 5000);
    }, i * 30);
  }
}

const fallKeyframes = "@keyframes fall{ to{ transform: translateY(105vh) rotate(720deg); opacity:.9; } }";
const styleTag = document.createElement("style");
styleTag.textContent = fallKeyframes;
document.head.appendChild(styleTag);

const musicBtn = document.getElementById("music-btn");
if(musicBtn){
  const audio = document.getElementById("bg-audio");
  musicBtn.addEventListener("click", () => {
    if(audio.paused){
      audio.play();
      musicBtn.classList.add("playing");
      musicBtn.textContent = "⏸";
    } else {
      audio.pause();
      musicBtn.classList.remove("playing");
      musicBtn.textContent = "🎵";
    }
  });
}

function buildStars(){
  const container = document.getElementById("stars");
  const count = 90;
  for(let i = 0; i < count; i++){
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 2 + 1;
    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = (Math.random() * 100) + "vw";
    s.style.top = (Math.random() * 100) + "vh";
    s.style.animationDelay = (Math.random() * 4) + "s";
    s.style.animationDuration = (3 + Math.random() * 3) + "s";
    container.appendChild(s);
  }
}
buildStars();
</script>
</body>
</html>
